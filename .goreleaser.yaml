# goreleaser v2 configuration for guardian.
#
# Produces a signed, reproducible release:
#   - pure-Go (CGO_ENABLED=0) cross-platform binaries,
#   - deterministic builds (mod_timestamp pinned to the commit),
#   - per-binary SBOMs (syft),
#   - a sha256 checksums file,
#   - cosign keyless (OIDC) signatures over the checksums file.
#
# Validate locally with:  goreleaser check
version: 2

project_name: guardian

# Run once before the build; keeps the module graph honest in CI.
before:
  hooks:
    - go mod verify
    - go mod tidy

builds:
  - id: guardian
    main: ./cmd/guardian
    binary: guardian
    # Pure Go: no cgo means statically linkable, reproducible, smaller native
    # attack surface (matches the project's no-cgo posture, incl. modernc sqlite).
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    # No Windows on arm64: skip a combination we don't ship.
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    # -s -w strip the symbol table/DWARF (smaller binary); Version is the
    # package-level var in cmd/guardian/version.go (var Version string).
    ldflags:
      - -s -w -X main.Version={{ .Version }}
    # Reproducible builds: pin embedded mod timestamp to the commit timestamp
    # instead of the (non-deterministic) build time.
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: guardian
    ids:
      - guardian
    # tar.gz everywhere except Windows, which gets a zip.
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - SECURITY.md
      - LICENSE
      - NOTICE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Software Bill of Materials, one per archive, generated by syft.
sboms:
  - id: archive
    artifacts: archive
    documents:
      - "{{ .ArtifactName }}.sbom.json"

# Keyless (OIDC) signing with cosign. Signs the checksums file, which in turn
# covers every released artifact (binaries + SBOMs) by sha256.
# Requires the workflow to grant id-token: write so cosign can mint an OIDC
# token against the Sigstore Fulcio CA / Rekor transparency log.
signs:
  - id: checksums
    cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

release:
  # Pre-release for v*-rc / v*-beta tags; final otherwise.
  prerelease: auto
  draft: false

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

# --- Homebrew tap (OPTIONAL) -------------------------------------------------
# Disabled by default: enabling it requires the tap repo
# github.com/johanviberg/homebrew-tap to already exist, plus a token with push
# rights to it, or the release will fail. Uncomment and create that repo first.
