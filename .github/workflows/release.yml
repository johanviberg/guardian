name: Release

# Fire on semver tag pushes (v1.2.3, v1.2.3-rc1, ...). Tagging is the only
# trigger: CI on main has already gated correctness; this workflow builds,
# signs, and publishes the immutable release artifacts.
on:
  push:
    tags:
      - "v*"

# Least privilege by default. The release job opts into exactly what it needs.
permissions:
  contents: read

env:
  GO_VERSION: "1.26.x"

jobs:
  release:
    name: build, sign & publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release and upload assets
      id-token: write # cosign keyless OIDC + build-provenance attestation
      packages: read # pull any private modules/images if needed
      attestations: write # write the SLSA build-provenance attestation
    steps:
      # Full history is required so goreleaser can build the changelog and
      # resolve .CommitTimestamp for reproducible builds. persist-credentials
      # is off so the checkout token isn't left on disk for later steps.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      # cosign: keyless blob signing of the checksums file.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # syft: SBOM generation backend invoked by goreleaser's sboms: section.
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      # Build + archive + checksum + SBOM + cosign sign + GitHub Release upload.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Default GITHUB_TOKEN is sufficient to publish to this repo's
          # Releases; no PAT needed since the optional Homebrew tap is disabled.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # First-party SLSA build provenance for every released binary. Globbing
      # the dist tree attests the compiled artifacts (not the archives), which
      # is what `gh attestation verify ./guardian` checks.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/**/guardian
            dist/**/guardian.exe
