name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege by default; jobs opt into more only if they need it.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.x"
  # Security/lint tools are pinned to explicit versions (not @latest) so a CI
  # run can't silently pull a newly-published — or compromised — release.
  # Dependabot's gomod/actions updates don't cover `go install` targets, so bump
  # these by hand and let the diff be reviewed like any other dependency change.
  STATICCHECK_VERSION: "v0.7.0"
  GOVULNCHECK_VERSION: "v1.3.0"
  GOSEC_VERSION: "v2.26.1"
  ZIZMOR_VERSION: "1.25.2"

jobs:
  # ---------------------------------------------------------------------------
  # Build + test across all first-class platforms.
  # ---------------------------------------------------------------------------
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: Verify module integrity
        run: go mod verify
      - name: Build
        run: go build ./...
      - name: Test (race detector)
        # Test our own packages only; the vendored Bumblebee tree is upstream
        # code (and its tests assume Unix paths, so they fail on Windows). This
        # mirrors the exclusion already used by the lint and security jobs.
        # shell: bash so the $(...) | grep pipeline also works on the Windows runner.
        shell: bash
        run: go test -race $(go list ./... | grep -v '/internal/bumblebee/')

  # ---------------------------------------------------------------------------
  # Formatting, vet, and static analysis.
  # ---------------------------------------------------------------------------
  lint:
    name: lint & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: gofmt
        run: |
          # The vendored bumblebee tree is upstream code; check only our own.
          unformatted="$(gofmt -l cmd internal/catalog internal/config internal/diff \
            internal/model internal/notify internal/policy internal/report \
            internal/scanner internal/service internal/store \
            | grep -v '^internal/bumblebee/' || true)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needed on:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: staticcheck
        run: |
          go install "honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}"
          staticcheck ./cmd/... $(go list ./internal/... | grep -v '/internal/bumblebee/')

  # ---------------------------------------------------------------------------
  # Security scanning. Tools are installed from source (no third-party Actions)
  # to keep the CI supply-chain surface minimal.
  # ---------------------------------------------------------------------------
  security:
    name: security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: govulncheck (Go vulnerability database)
        run: |
          go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
          govulncheck ./...

      - name: gosec (static security analysis)
        run: |
          go install "github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}"
          # Exclude the vendored upstream tree from our own SAST gate.
          gosec -exclude-dir=internal/bumblebee ./...

  # ---------------------------------------------------------------------------
  # Static analysis of our own GitHub Actions workflows. zizmor catches the
  # misconfigurations behind the 2025-2026 Actions supply-chain attacks
  # (unpinned actions, template injection, dangerous triggers, over-broad
  # tokens) before they ship, and keeps that posture from regressing as
  # Dependabot rewrites action SHAs over time. Installed via pipx at a pinned
  # version; results land in the code-scanning tab as SARIF.
  # ---------------------------------------------------------------------------
  workflow-audit:
    name: workflow audit (zizmor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run zizmor
        run: pipx run "zizmor==${ZIZMOR_VERSION}" --format=sarif . > zizmor.sarif
        env:
          # Lets zizmor run its online audits (e.g. resolving action refs).
          GH_TOKEN: ${{ github.token }}
      - name: Upload SARIF
        if: always() # publish findings even when zizmor exits non-zero
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: zizmor.sarif
          category: zizmor

  # ---------------------------------------------------------------------------
  # Dogfooding: run guardian against its own source tree. Fails the build only
  # on a confirmed-malicious finding (exit code 2), which is exactly the gate we
  # tell users to apply.
  # ---------------------------------------------------------------------------
  self-scan:
    name: guardian self-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: Build guardian
        run: go build -o guardian ./cmd/guardian
      - name: Scan this repository (offline, embedded catalog)
        run: |
          set +e
          ./guardian scan project --root . --no-fetch --json
          code=$?
          echo "guardian exit code: $code"
          # 0 = clean, 1 = non-critical findings (allowed), 2 = confirmed-malicious (fail).
          if [ "$code" -ge 2 ]; then
            echo "::error::guardian found a confirmed-malicious package in this repo"
            exit 1
          fi
